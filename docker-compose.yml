services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartparkpro
      POSTGRES_USER: smartpark
      POSTGRES_PASSWORD: smartpark
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpark -d smartparkpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartparkpro
      SPRING_DATASOURCE_USERNAME: smartpark
      SPRING_DATASOURCE_PASSWORD: smartpark
      JWT_SECRET: smartparkpro-production-secret-change-me-at-deploy-time-512-bits-minimum
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
